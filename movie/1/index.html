<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Hail Mary</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      overflow:hidden;
    }

    /* NAVBAR */
    .navbar{
      width:100%;
      height:70px;
      background:#111;
      display:flex;
      align-items:center;
      padding:0 30px;
      position:fixed;
      top:0;
      left:0;
      z-index:100;
      border-bottom:1px solid #222;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:white;
      text-decoration:none;
    }

    /* PLAYER AREA */
    .player-wrapper{
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding-top:70px;
    }

    .video-container{
      position:relative;
      width:66%;
      max-width:1400px;
      aspect-ratio:16/9;
      background:black;
      overflow:hidden;
      border-radius:14px;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:black;
    }

    /* CONTROLS */
    .controls{
      position:absolute;
      bottom:0;
      left:0;
      width:100%;
      padding:18px;
      background:linear-gradient(to top, rgba(0,0,0,.8), transparent);
      display:flex;
      align-items:center;
      gap:15px;
      opacity:1;
      transition:opacity .3s ease;
    }

    .controls.hide{
      opacity:0;
      pointer-events:none;
    }

    button{
      background:none;
      border:none;
      color:white;
      font-size:22px;
      cursor:pointer;
    }

    .progress{
      flex:1;
      height:5px;
      appearance:none;
      cursor:pointer;
      border-radius:999px;
    }

    .progress::-webkit-slider-thumb{
      appearance:none;
      width:14px;
      height:14px;
      border-radius:50%;
      background:white;
      cursor:pointer;
    }

    .time{
      font-size:14px;
      color:#ddd;
      min-width:120px;
    }

    .video-container:fullscreen{
      width:100%;
      height:100%;
      border-radius:0;
    }

  </style>
</head>
<body>

  <div class="navbar">
    <a href="/" class="logo">Movie2365</a>
  </div>

  <div class="player-wrapper">
    <div class="video-container" id="videoContainer">

      <!-- ✅ poster fixes black loading screen -->
      <video id="video" poster="https://wsrv.nl/?url=https%3A%2F%2Fimage.tmdb.org%2Ft%2Fp%2Fw780%2FwLWvHcQz7N13DvSOTV7bHgwGXpT.jpg&output=webp&q=65&n=-1">
        <source src="https://ia600108.us.archive.org/6/items/project-hail-mary-2026_20260527/Project%20Hail%20Mary%20-%20%5B2026%5D.mp4" type="video/mp4">
      </video>

      <div class="controls" id="controls">

        <button id="playPause">▶</button>

        <input
          type="range"
          min="0"
          max="100"
          value="0"
          class="progress"
          id="progress"
        >

        <div class="time" id="time">
          0:00 / 0:00
        </div>

        <button id="fullscreen">⛶</button>

      </div>

    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const playPause = document.getElementById("playPause");
    const progress = document.getElementById("progress");
    const fullscreen = document.getElementById("fullscreen");
    const controls = document.getElementById("controls");
    const container = document.getElementById("videoContainer");
    const time = document.getElementById("time");

    let hideTimeout;

    // ✅ better time format (supports hours)
    const format = (t) => {
      const hrs = Math.floor(t / 3600);
      const mins = Math.floor((t % 3600) / 60);
      const secs = Math.floor(t % 60).toString().padStart(2, "0");

      if (isNaN(t)) return "0:00";

      if (hrs > 0) {
        return `${hrs}:${mins.toString().padStart(2, "0")}:${secs}`;
      }
      return `${mins}:${secs}`;
    };

    // ✅ load duration properly (fixes 0:00 / 0:00 bug)
    video.addEventListener("loadedmetadata", () => {
      time.textContent = `0:00 / ${format(video.duration)}`;
    });

    // PLAY / PAUSE
    playPause.addEventListener("click", () => {
      if(video.paused){
        video.play();
        playPause.textContent = "❚❚";
      } else {
        video.pause();
        playPause.textContent = "▶";
      }
    });

    // UPDATE PROGRESS
    video.addEventListener("timeupdate", () => {
      const percent =
        (video.currentTime / video.duration) * 100;

      progress.value = percent || 0;

      time.textContent =
        `${format(video.currentTime)} / ${format(video.duration)}`;
    });

    // SEEK
    progress.addEventListener("input", () => {
      video.currentTime =
        (progress.value / 100) * video.duration;
    });

    // FULLSCREEN
    fullscreen.addEventListener("click", () => {
      if(!document.fullscreenElement){
        container.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    // CONTROLS HIDE
    const showControls = () => {
      controls.classList.remove("hide");

      clearTimeout(hideTimeout);

      hideTimeout = setTimeout(() => {
        if(!video.paused){
          controls.classList.add("hide");
        }
      }, 2500);
    };

    container.addEventListener("mousemove", showControls);

    video.addEventListener("play", showControls);

    video.addEventListener("pause", () => {
      controls.classList.remove("hide");
    });

  </script>

</body>
</html>
